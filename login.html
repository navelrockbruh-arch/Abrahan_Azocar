<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>SpaceCode Login</title>

<style>
body {
margin: 0;
font-family: Arial;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
background: radial-gradient(circle at top, #0b1a3a, #050814);
overflow: hidden;
}

/* estrellas */
body::before {
content: "";
position: absolute;
width: 200%;
height: 200%;
background-image: radial-gradient(white 1px, transparent 1px);
background-size: 50px 50px;
opacity: 0.2;
animation: moveStars 60s linear infinite;
}

@keyframes moveStars {
from { transform: translateY(0); }
to { transform: translateY(-500px); }
}

.login-card {
position: relative;
z-index: 2;
width: 350px;
padding: 30px;
border-radius: 15px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
box-shadow: 0 0 25px rgba(0,200,255,0.3);
color: white;
text-align: center;
}

.login-card h1 {
margin-bottom: 20px;
letter-spacing: 2px;
}

input {
width: 100%;
padding: 12px;
margin: 10px 0;
border: none;
border-radius: 8px;
outline: none;
}

button {
width: 100%;
padding: 12px;
margin-top: 10px;
border: none;
border-radius: 8px;
background: #00c8ff;
color: black;
font-weight: bold;
cursor: pointer;
transition: 0.3s;
}

button:hover {
background: #00a6d6;
transform: scale(1.03);
}

button:disabled {
background: gray;
cursor: not-allowed;
}

.error {
color: #ff4d4d;
font-size: 14px;
margin-top: 10px;
}

.back {
display: block;
margin-top: 15px;
color: #aaa;
text-decoration: none;
}

.back:hover {
color: white;
}
</style>

</head>

<body>

<div class="login-card">

<h1> SpaceCode Access</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button id="btn" onclick="login()">Ingresar</button>

<div id="msg" class="error"></div>

<a href="index.html" class="back">← Volver</a>

</div>

<script>
async function login() {

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();
const btn = document.getElementById("btn");
const msg = document.getElementById("msg");

msg.innerText = "";

// VALIDACIÓN
if (!email || !password) {
msg.innerText = "Completa todos los campos";
return;
}

// loading
btn.disabled = true;
btn.innerText = "Conectando...";

try {

const res = await fetch("http://localhost:3000/login", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ email, password })
});

const data = await res.json();

if (data.token) {
localStorage.setItem("token", data.token);
btn.innerText = "Acceso concedido ✔";
setTimeout(() => {
window.location.href = "panel.html";
}, 800);
} else {
msg.innerText = data.error || "Credenciales inválidas";
btn.disabled = false;
btn.innerText = "Ingresar";
}

} catch (error) {
msg.innerText = "Error de conexión con el servidor";
btn.disabled = false;
btn.innerText = "Ingresar";
}
}
</script>

</body>
</html>
